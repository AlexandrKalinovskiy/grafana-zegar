services:
  clock:
    build: .
    container_name: zegar
    environment:
      - DISPLAY=:0
      - TZ=${TZ:-Europe/Warsaw}
      - XAUTHORITY=/root/.Xauthority
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /home/pnt/.Xauthority:/root/.Xauthority:ro
      - ./.env:/app/.env
      # Zapisana pozycja/rozmiar okna – przetrwa restarty kontenera
      - ./home_pos.json:/app/home_pos.json
    network_mode: host
    restart: unless-stopped
