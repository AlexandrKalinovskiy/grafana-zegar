services:
  clock:
    build: .
    container_name: zegar
    environment:
      # DISPLAY: jeśli nie ustawione w środowisku, próbuje :0 (standardowy X11 na Raspberry Pi)
      - DISPLAY=${DISPLAY:-:0}
      - TZ=${TZ:-Europe/Warsaw}
      - XAUTHORITY=${XAUTHORITY:-/root/.Xauthority}
    volumes:
      # X11 socket – wymagany aby kontener otworzył okno na pulpicie
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Xauthority – pliki autoryzacji X11 (jeśli istnieją)
      - ${XAUTHORITY:-/root/.Xauthority}:/root/.Xauthority:ro
      # Konfiguracja alarmu
      - ./.env:/app/.env
    network_mode: host
    restart: unless-stopped
