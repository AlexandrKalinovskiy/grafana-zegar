services:
  clock:
    build: .
    container_name: zegar
    environment:
      # :0 = XWayland display (standardowy na Raspberry Pi OS z Waylandem)
      # Zmień na :1 jeśli `ls /tmp/.X11-unix/` pokazuje X1
      - DISPLAY=:0
      - TZ=${TZ:-Europe/Warsaw}
    volumes:
      # XWayland socket – pozwala kontenerowi rysować okno na pulpicie
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Konfiguracja alarmu (zmień bez przebudowywania obrazu)
      - ./.env:/app/.env
    network_mode: host
    restart: unless-stopped
